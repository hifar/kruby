services:
  kruby:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kruby
    ports:
      - "0.0.0.0:3012:3012"
    environment:
      DATABASE_URL: "file:/app/data/dev.db"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: "production"
    volumes:
      - kruby_data:/app/data
    restart: unless-stopped

volumes:
  kruby_data: